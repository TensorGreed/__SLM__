version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: slm_postgres
    restart: always
    environment:
      POSTGRES_USER: slm_user
      POSTGRES_PASSWORD: slm_password
      POSTGRES_DB: slm_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: slm_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: slm_backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://slm_user:slm_password@db:5432/slm_platform
      - REDIS_URL=redis://redis:6379/0
      - DB_AUTO_CREATE=false
      - ALLOW_SQLITE_AUTOCREATE=false
      - DB_REQUIRE_ALEMBIC_HEAD=true
      - DATA_DIR=/data
      - TRAINING_BACKEND=external
      - COMPRESSION_BACKEND=external
    volumes:
      - platform_data:/data

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: slm_worker
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql+asyncpg://slm_user:slm_password@db:5432/slm_platform
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/data
      - TRAINING_BACKEND=external
      - COMPRESSION_BACKEND=external
    # Set deploy configs for GPU access if runtime=nvidia is available
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    volumes:
      - platform_data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: slm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
  platform_data:
